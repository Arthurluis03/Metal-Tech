<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style/style.css" />
   
    <title>METALTECH</title>

  </head>
  <body>
    <header>
      <div class="logo">
        <img src="image/logo.png" alt="logo" />
      </div>
    </header>
    <main>
      <form action="#" class="formvt">
        <div class="box-form">
          <div class="form-campo">
            <label for="nome">Nome da ferramenta: <span>*</span></label>
            <input
              type="text"
              name="name"
              id="name"
              placeholder="Informe a ferramenta"
              required
            />
          </div>

          <div class="form-campo">
            <label for="nome">Tipo: <span>*</span></label>
            <select id="tipo" >
              <option value="#" disabled>Selecione o tipo</option>
              <option value="corte">Corte</option>
              <option value="medicao">Medição</option>
              <option value="aperto">Aperto</option>
              <option value="soldagem">Soldagem</option>
            </select>
          </div>

          <div class="form-campo">
            <label for="nome">Quantidade: <span>*</span></label>
            <input
              type="number"
              name="quantidade"
              id="quantidade"
              placeholder="Informe a quantidade"
              required
            />
          </div>

          <div class="form-campo">
            <label for="nome">Setor: <span>*</span></label>
            <select id="setor">
              <option value="#" disabled>Selecione o setor</option>
              <option value="usinagem">Usinagem</option>
              <option value="montagem">Montagem</option>
              <option value="solda">Solda</option>
              <option value="manutencao">Manutenção</option>
            </select>
          </div>

          <div class="form-campo">
            <label for="nome">Código: <span>*</span></label>
            <input
              type="text"
              name="codigo"
              id="codigo"
              placeholder="Informe o codigo"
              required
            />
          </div>

          <div class="form-campo">
            <label for="nome">Fabricante: <span>*</span></label>
            <input
              type="text"
              name="fornecedor"
              id="fornecedor"
              placeholder="Informe o fornecedor"
              required
            />
          </div>
        </div>
        <div class="form-botao">
          <button class="btn-cadastrar">CADASTRAR</button>
          <button class="btn-limpar">LIMPAR</button>
        </div>
      </form>
    </main>
      <ol id="list-product"></ol>
    <div class="table-client">
  <table class="table-test">
    <thead>
      <tr>
        <th>Ferramenta</th>
        <th>Tipo</th>
        <th>Quantidade</th>
        <th>Setor</th>
        <th>Código</th>
        <th>Fornecedor</th>
      </tr>
    </thead>

    <tbody id="clientesTable">
    </tbody>
  </table>
    <footer>
      <p>&copy; 2026 MetalTech Industrial - Todos os direitos resevados</p>
    </footer> 
    <script src="script/script.js" defer></script>
  </body>
</html>
